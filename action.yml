name: Validate ProductSpec files
description: Validate ProductSpec Markdown, Decision Trace, and Agent Run files in a GitHub Actions workflow.
author: Gokul Rajaram

branding:
  icon: check-square
  color: blue

inputs:
  files:
    description: "Space-separated ProductSpec files or globs to validate."
    required: false
    default: "**/*.product-spec.md"
  decision_traces:
    description: "Optional space-separated Decision Trace JSON files or globs to validate."
    required: false
    default: ""
  agent_runs:
    description: "Optional space-separated Agent Run JSON files or globs to validate."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Validate ProductSpec files
      shell: bash
      env:
        FILES: ${{ inputs.files }}
        DECISION_TRACES: ${{ inputs.decision_traces }}
        AGENT_RUNS: ${{ inputs.agent_runs }}
      run: |
        set -euo pipefail
        shopt -s globstar nullglob

        files=($FILES)
        if [ ${#files[@]} -eq 0 ]; then
          echo "No ProductSpec files matched: $FILES"
          exit 0
        fi

        for file in "${files[@]}"; do
          npm exec --yes --package @productspec/parser -- productspec validate "$file"
        done

        if [ -n "$DECISION_TRACES" ]; then
          traces=($DECISION_TRACES)
          if [ ${#traces[@]} -eq 0 ]; then
            echo "No Decision Trace files matched: $DECISION_TRACES"
            exit 0
          fi

          for trace in "${traces[@]}"; do
            npm exec --yes --package @productspec/parser -- productspec validate-trace "$trace"
          done
        fi

        if [ -n "$AGENT_RUNS" ]; then
          runs=($AGENT_RUNS)
          if [ ${#runs[@]} -eq 0 ]; then
            echo "No Agent Run files matched: $AGENT_RUNS"
            exit 0
          fi

          for run in "${runs[@]}"; do
            npm exec --yes --package @productspec/parser -- productspec validate-run "$run"
          done
        fi
